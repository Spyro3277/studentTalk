<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="/static/styles.css">

    </head>
    <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        

    <body>
         <div class="container">
            <h1>🎓 Academic Assistant</h1>
            <p>Ask me anything about your C++ or Algorithms course!</p>
            
            <div class="chat-container" id="chatContainer">
                <div class="message bot-message">
                    Hi! I'm your academic assistant. I can help you with course content, assignments, and programming questions. How can I help you today?
                </div>
                
            </div>
            
            <div class="input-container">
                <input type="text" id="messageInput" class="message-input" placeholder="Type your question here..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()" class="send-btn">Send</button>
            </div>
            
            <p><small>🔒 Your conversations are monitored for academic support and wellbeing.</small></p>
        </div>

        <div>
            <label for="folderSelect">Choose a class:</label>
            <select id="folderSelect">
                <option value="">Loading Folders...</option>
            </select>

            <script src="/static/selectCourseFolder.js"></script>
            <button id="chooseClass" onclick="loadFolder()">Load Class</button>

           
        </div>

        <script>
            const courseName = document.getElementById("folderSelect").value;
           
            const studentId = 'student_' + Math.random().toString(36).substr(2, 9);
            const ws = new WebSocket(`ws://localhost:8000/ws/${courseName}/${studentId}`);
            let thinkingMessage = null;
            
            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);

                if(thinkingMessage){
                    thinkingMessage.textContent = data.message;
                    thinkingMessage = null;
                }else{
                    addMessage(data.message, 'bot');
                }
                
               
                
                if (data.flagged) {
                    console.log('Student flagged for wellbeing check');
                }
            };
            
            function addMessage(message, sender) {
                const chatContainer = document.getElementById('chatContainer');
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}-message`;
                messageDiv.textContent = message;
                chatContainer.appendChild(messageDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                return messageDiv;
            }
            
            function sendMessage() {
                const input = document.getElementById('messageInput');
                const message = input.value.trim();
                
                
                if (message) {
                    addMessage(message, 'user');

                    thinkingMessage = addMessage('Thinking...', 'bot');
                    ws.send(JSON.stringify({message: message}));
                    input.value = '';

                    
                }
            }

        
            
            function handleKeyPress(event) {
                if (event.key === 'Enter') {
                    sendMessage();
                }
            }
        </script>
        

    </body>
</html>
